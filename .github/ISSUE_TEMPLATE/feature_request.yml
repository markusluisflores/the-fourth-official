name: Feature Request
description: Propose a new feature or enhancement
labels: ["enhancement"]
body:
  - type: checkboxes
    attributes:
      label: Pre-submission
      options:
        - label: I searched existing issues and this is not a duplicate
          required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem / Motivation
      description: What problem does this solve? What use case does it enable?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: What would you like to happen?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: What other approaches did you consider and why did you rule them out?

  - type: dropdown
    id: priority
    attributes:
      label: Priority
      options:
        - "P3 — Nice to have"
        - "P2 — Important for core workflow"
        - "P1 — Blocking significant use case"
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Screenshots, mockups, references to similar implementations

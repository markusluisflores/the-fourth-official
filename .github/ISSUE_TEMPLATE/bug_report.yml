name: Bug Report
description: Report a defect found after merge to main or a release
labels: ["bug"]
body:
  - type: checkboxes
    attributes:
      label: Pre-submission
      options:
        - label: I searched existing issues and this is not a duplicate
          required: true
        - label: This defect was found after merge to main or a release (not during active development)
          required: true

  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: One sentence — what is broken?
    validations:
      required: true

  - type: dropdown
    id: priority
    attributes:
      label: Priority
      options:
        - "P0 — Release blocker (crash / data loss / security / complete failure)"
        - "P1 — Fix before next release (core feature broken)"
        - "P2 — Schedule next cycle (partial failure, workaround exists)"
        - "P3 — Backlog (minor / cosmetic / edge case)"
        - "P4 — Won't fix / by design"
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      placeholder: "1. \n2. \n3. "
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
    validations:
      required: true

  - type: textarea
    id: root-cause
    attributes:
      label: Root Cause
      description: Run systematic-debugging before filing. Paste findings here.

  - type: textarea
    id: context
    attributes:
      label: Environment / Additional Context
      description: Version, branch, OS, browser, stack trace, screenshots
